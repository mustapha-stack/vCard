<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustapha Belhaouari | Contact</title>
    <link rel="stylesheet" href="./css/structure.css">
      <link rel="stylesheet" href="./css/contact.css">
     <link rel="icon" type="image/jpeg" href="./image/autochtones_quebec.jpg">
</head>
<body>

    <header>
      
    </header>

    <main>
        <section class="contact-container">
            <h2 class="contact-main-title">Me Contacter</h2>
            <p class="contact-subtitle">Une question, une opportunité ou un projet IoT ? N'hésitez pas à m'envoyer un message.</p>

            <div class="contact-grid">
                <!-- Formulaire de contact -->
                <form class="contact-form" action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" name="name" placeholder="Votre nom" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Adresse courriel</label>
                        <input type="email" id="email" name="email" placeholder="votre@courriel.com" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Sujet</label>
                        <input type="text" id="subject" name="subject" placeholder="Le motif de votre message" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Écrivez votre message ici..." required></textarea>
                    </div>

                                      <!-- Conteneur pour aligner les deux boutons côte à côte -->
                    <div class="form-buttons-group">
                        <button type="submit" class="btn btn-submit">Envoyer le message</button>
                        <button type="reset" class="btn btn-reset">Effacer</button>
                    </div>
                </form>
    </form>

                <!-- Infos de contact secondaires -->
                <div class="contact-info-block">
                    <h3>Mes Coordonnées</h3>
                    <div class="info-item">
                        <strong>Localisation :</strong>
                        <p>Montréal, QC</p>
                    </div>
                    <div class="info-item">
                        <strong>Mon email:</strong>
                        <p>belhaouari_85@gmail.com</p>
                    </div>
                      <div class="info-item">
                        <strong>Telephonne:</strong>
                        <p>(438) 925 7168</p>
                    </div>
                    <div class="info-item">
                        <strong>Réseaux :</strong>
                        <p>Retrouvez-moi également sur les plateformes professionnelles ci-dessous.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
  
    </footer>
<script src="./structure.js"></script>

</body>
</html>
